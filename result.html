<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Search Result</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #dbdbdb;
        color: #ffffff;
        max-width: 1440px;
        width: 100%;
        margin: 0 auto;
      }

      /* Container */
      .container {
        width: 60%;
        margin: 40px auto;
        padding: 20px;
      }

      /* Search Header */
      .search-bar {
        background: #1c1c1f;
        padding: 15px 20px;
        border-radius: 30px;
        color: #aaa;
        margin-bottom: 30px;
      }

      /* Card */
      .card {
        background: #9c0d6a;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px #3e3e3e80;
      }

      /* Top Tags */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 15px;
      }

      .tag {
        background: #e88a07;
        padding: 8px 12px;
        border-radius: 20px;
        font-size: 13px;
        color: #ffffff;
        font-weight: 600;
      }

      /* Layout */
      .content {
        display: flex;
        gap: 20px;
      }

      .poster {
        width: 50%;
        border-radius: 10px;
      }

      .details h2 {
        margin: 0 0 10px;
      }

      .details p {
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
      }

      /* Info Section */
      .info {
        margin-top: 15px;
      }

      .info div {
        margin: 8px 0;
        color: #ffffff;
        font-weight: 600;
      }

      /*===============================
             📱 Mobile Responsive
        =============================== */

      @media screen and (max-width: 768px) {
        .container {
          margin: 20px auto;
          padding: 10px;
          width: 90%;
        }

        .search-bar {
          font-size: 14px;
          padding: 12px 15px;
        }

        .card {
          width: 100%;
          padding: 10px;
          border-radius: 15px;
        }

        /* Stack layout */
        .content {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }

        .poster {
          width: 140px;
          margin-bottom: 15px;
        }

        .details h2 {
          font-size: 20px;
        }

        .details p {
          font-size: 13px;
        }

        /* Tags wrap nicely */
        .tags {
          justify-content: center;
        }

        .tag {
          font-size: 12px;
          padding: 6px 10px;
        }

        .info {
          text-align: left;
        }

        .info div {
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <form action="">
        <div style="position: relative">
          <input
            type="text"
            id="movieInput"
            placeholder="Search for a movie..."
            style="
              width: 100%;
              padding: 10px 15px;
              border-radius: 30px;
              border: none;
              font-size: 16px;
              margin-bottom: 20px;
            "
            class="search-input"
          />
          <button
            style="
              position: absolute;
              right: 7px;
              top: 35%;
              transform: translateY(-50%);
              background: linear-gradient(135deg, #ffd000, rgb(89, 255, 0));
              border-radius: 10px;
              padding: 5px 15px;
              font-size: 16px;
              border: none;
              cursor: pointer;
              color: black;
              font-weight: 500;
            "
            class="search"
            onclick="searchMovie(event)"
          >
            Search
          </button>
        </div>
      </form>

      <div class="card results">
        <!-- Tags -->
        <div class="tags">
          <div class="tag">Year: --</div>
          <div class="tag">Rated: --</div>
          <div class="tag">Released: --</div>
          <div class="tag">Genre: --</div>
          <div class="tag">Language: --</div>
          <div class="tag">Country: --</div>
        </div>

        <div class="content">
          <img src="" class="poster" alt="Movie Poster" />

          <div class="details">
            <h1>Movie Title</h1>
            <p>
              Movie plot will appear here....
            </p>
            
            <div class="info">
              <div><strong>Writer:</strong> </div>
              <div>
                <strong>Actors:</strong> 
              </div>
              <div><strong>IMDb Rating:</strong> ⭐ </div>
              <div>
                <strong>Awards:</strong> 
              </div>
              <div><strong>Seasons:</strong> </div>
              <div><strong>Runtime:</strong> </div>
            </div>
          </div>
        </div>
      </div>
    </div>
